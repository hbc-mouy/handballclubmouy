*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --dark: #0a0f08;
  --dark2: #121a0e;
  --green: #1a7a1a;

  --green-light: #2db82d;
  --green-bright: #3ddc3d;
  --green-glow: rgba(34,139,34,0.25);

}

html { scroll-behavior: smooth; }

body {
  background: var(--dark);

  line-height: 1.7;
  overflow-x: hidden;
}

nav {

  background: rgba(10,15,8,0.93);

  border-bottom: 1px solid rgba(34,139,34,0.25);
}

.nav-logo {
  display: flex;
  align-items: center;
  gap: 0.8rem;
  text-decoration: none;
}

.nav-logo img {
  height: 44px;
  width: 44px;
  object-fit: contain;
  border-radius: 50%;
}

.nav-logo-text {

  letter-spacing: 0.06em;
  color: var(--green-light);
}

.nav-links {
  display: flex;
  gap: 2.5rem;
  list-style: none;
}
